name: Publish to npm

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    name: Publish packages to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # For npm provenance

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npm run build

      - name: Run integration test
        run: npx tsx demo/replay-demo.ts
        timeout-minutes: 2

      - name: Publish @ergenekon/core
        run: npm publish --access public --workspace=packages/ergenekon-core --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @ergenekon/probe
        run: npm publish --access public --workspace=packages/ergenekon-probe --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @ergenekon/collector
        run: npm publish --access public --workspace=packages/ergenekon-collector --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @ergenekon/replay
        run: npm publish --access public --workspace=packages/ergenekon-replay --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @ergenekon/cli
        run: npm publish --access public --workspace=packages/ergenekon-cli --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @ergenekon/ui
        run: npm publish --access public --workspace=packages/ergenekon-ui --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## ERGENEKON Engine ${{ github.ref_name }}

            Deterministic record & replay debugger for distributed systems.

            ### Install
            ```bash
            npm install @ergenekon/probe @ergenekon/collector @ergenekon/replay
            npm install -g @ergenekon/cli
            ```

            ### Packages Published
            - [@ergenekon/core](https://npmjs.com/package/@ergenekon/core) — Types, HLC, ULID, session I/O
            - [@ergenekon/probe](https://npmjs.com/package/@ergenekon/probe) — Node.js recording middleware
            - [@ergenekon/collector](https://npmjs.com/package/@ergenekon/collector) — Event collection server
            - [@ergenekon/replay](https://npmjs.com/package/@ergenekon/replay) — Deterministic replay engine
            - [@ergenekon/cli](https://npmjs.com/package/@ergenekon/cli) — Time-travel CLI tool
            - [@ergenekon/ui](https://npmjs.com/package/@ergenekon/ui) — Visual debugger web UI
