{{- if and .Values.ui.enabled .Values.ui.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "paradox.fullname" . }}-ui
  labels:
    {{- include "paradox.labels" . | nindent 4 }}
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
spec:
  ingressClassName: {{ .Values.ui.ingress.className }}
  {{- if .Values.ui.ingress.tls }}
  tls:
    - hosts:
        - {{ .Values.ui.ingress.host }}
      secretName: {{ include "paradox.fullname" . }}-ui-tls
  {{- end }}
  rules:
    - host: {{ .Values.ui.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "paradox.fullname" . }}-ui
                port:
                  name: http
{{- end }}
