version: '3.9'

# ERGENEKON Engine — Docker Compose (Hardened)
# Usage:
#   docker-compose up              # Start collector + UI
#   docker-compose up -d           # Background mode
#   docker-compose logs -f         # Stream logs
#   docker-compose down            # Stop all

services:
  # ─────────────────────────────────────────────
  # ERGENEKON Collector — receives and stores events
  # ─────────────────────────────────────────────
  collector:
    build:
      context: .
      dockerfile: docker/collector.Dockerfile
    ports:
      - "4380:4380"
    environment:
      PORT: 4380
      STORAGE_DIR: /data/sessions
      LOG_LEVEL: info
    volumes:
      - ergenekon-data:/data/sessions
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4380/api/v1/stats"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - backend
    # Security hardening
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    cap_drop:
      - ALL

  # ─────────────────────────────────────────────
  # ERGENEKON UI — Time-Travel visual debugger
  # ─────────────────────────────────────────────
  ui:
    build:
      context: .
      dockerfile: docker/ui.Dockerfile
    ports:
      - "3000:3000"
    environment:
      ERGENEKON_COLLECTOR_URL: http://collector:4380
    depends_on:
      collector:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - frontend
      - backend
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    cap_drop:
      - ALL

  # ─────────────────────────────────────────────
  # Example App — your service with ERGENEKON probe
  # Comment out if you're attaching your own app
  # ─────────────────────────────────────────────
  demo-app:
    build:
      context: .
      dockerfile: docker/demo.Dockerfile
    ports:
      - "3001:3001"
    environment:
      ERGENEKON_COLLECTOR_URL: http://collector:4380
      ERGENEKON_SERVICE_NAME: demo-app
      ERGENEKON_SAMPLE_RATE: "0.1"
      PORT: 3001
    depends_on:
      collector:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - backend
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    cap_drop:
      - ALL

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
    internal: true  # No external access — containers only

volumes:
  ergenekon-data:
    driver: local
