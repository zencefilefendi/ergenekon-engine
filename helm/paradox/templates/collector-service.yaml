apiVersion: v1
kind: Service
metadata:
  name: {{ include "paradox.fullname" . }}-collector
  labels:
    {{- include "paradox.labels" . | nindent 4 }}
    app.kubernetes.io/component: collector
spec:
  type: {{ .Values.collector.service.type }}
  ports:
    - port: {{ .Values.collector.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "paradox.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: collector
